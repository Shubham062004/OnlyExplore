<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="travelPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Airplane -->
      <g transform="translate(20, 30) rotate(15)">
        <path d="M0,10 L20,8 L25,10 L30,12 L35,15 L40,20 L35,25 L30,28 L25,30 L20,32 L0,30 L5,25 L10,20 L5,15 Z" fill="none" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Suitcase -->
      <g transform="translate(60, 45)">
        <rect x="0" y="5" width="25" height="18" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <rect x="2" y="7" width="21" height="14" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M12,5 L12,2 L16,2 L16,5" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="6" cy="20" r="2" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="19" cy="20" r="2" fill="none" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Camera -->
      <g transform="translate(100, 35) rotate(-10)">
        <rect x="0" y="8" width="20" height="15" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="10" cy="12" r="4" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="10" cy="12" r="2" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <rect x="8" y="2" width="4" height="6" fill="none" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Palm Tree -->
      <g transform="translate(140, 25)">
        <path d="M8,30 L8,5" fill="none" stroke="#87CEEB" stroke-width="2"/>
        <path d="M2,10 Q8,5 14,10 Q8,8 2,10" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M2,15 Q8,10 14,15 Q8,13 2,15" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M2,20 Q8,15 14,20 Q8,18 2,20" fill="none" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Sun -->
      <g transform="translate(180, 40)">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M0,-12 L0,-15 M0,12 L0,15 M-12,0 L-15,0 M12,0 L15,0" stroke="#87CEEB" stroke-width="1"/>
        <path d="M-8,-8 L-11,-11 M8,8 L11,11 M-8,8 L-11,11 M8,-8 L11,-11" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Cocktail -->
      <g transform="translate(30, 90) rotate(25)">
        <path d="M5,20 L5,5 L15,5 L15,20 L12,20 L12,8 L8,8 L8,20 Z" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="10" cy="15" r="2" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M10,3 L10,0" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Ice Cream -->
      <g transform="translate(70, 85)">
        <path d="M8,15 L8,5 L12,5 L12,15" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="10" cy="3" r="3" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="10" cy="0" r="2" fill="none" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Another Airplane -->
      <g transform="translate(120, 100) rotate(-20)">
        <path d="M0,10 L20,8 L25,10 L30,12 L35,15 L40,20 L35,25 L30,28 L25,30 L20,32 L0,30 L5,25 L10,20 L5,15 Z" fill="none" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Beach Ball -->
      <g transform="translate(160, 95)">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M-8,0 L8,0 M0,-8 L0,8" stroke="#87CEEB" stroke-width="1"/>
      </g>
      
      <!-- Sunglasses -->
      <g transform="translate(190, 90) rotate(10)">
        <circle cx="-3" cy="0" r="6" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <circle cx="3" cy="0" r="6" fill="none" stroke="#87CEEB" stroke-width="1"/>
        <path d="M-9,0 L9,0" stroke="#87CEEB" stroke-width="1"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="200" height="200" fill="url(#travelPattern)"/>
</svg>
